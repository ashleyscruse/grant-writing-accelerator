<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="960" height="430" rx="18" fill="#ffffff"/>
  <text x="480" y="60" text-anchor="middle" font-size="36" font-weight="700" fill="#1a1a1a">Two doors to Vista</text>
  <text x="480" y="92" text-anchor="middle" font-size="17" fill="#6b6b6b">Same supercomputer. Same files. Pick the door you like.</text>

  <!-- Left: Terminal -->
  <rect x="70" y="135" width="330" height="200" rx="14" fill="#f6f7f9" stroke="#e3e5ea"/>
  <rect x="100" y="165" width="120" height="78" rx="8" fill="#1e1e24"/>
  <text x="116" y="212" font-size="30" font-weight="700" fill="#5ad17a" font-family="monospace">&gt;_</text>
  <text x="235" y="190" font-size="22" font-weight="700" fill="#1a1a1a">Terminal</text>
  <text x="235" y="216" font-size="15" fill="#6b6b6b">SSH, the classic</text>
  <text x="235" y="236" font-size="15" fill="#6b6b6b">command line</text>
  <text x="100" y="300" font-size="14" fill="#9a9aa2" font-family="monospace">ssh you@vista.tacc.utexas.edu</text>

  <!-- Sync arrows -->
  <text x="480" y="245" text-anchor="middle" font-size="40" fill="#B30022">⇄</text>

  <!-- Right: Tapis web -->
  <rect x="560" y="135" width="330" height="200" rx="14" fill="#f6f7f9" stroke="#e3e5ea"/>
  <rect x="590" y="165" width="130" height="86" rx="8" fill="#ffffff" stroke="#cfd2da"/>
  <rect x="590" y="165" width="130" height="22" rx="8" fill="#eef0f4"/>
  <circle cx="601" cy="176" r="3" fill="#cfd2da"/>
  <circle cx="612" cy="176" r="3" fill="#cfd2da"/>
  <circle cx="623" cy="176" r="3" fill="#cfd2da"/>
  <rect x="600" y="200" width="110" height="9" rx="4" fill="#dfe2e8"/>
  <rect x="600" y="218" width="80" height="9" rx="4" fill="#dfe2e8"/>
  <text x="735" y="190" font-size="22" font-weight="700" fill="#1a1a1a">Tapis</text>
  <text x="735" y="216" font-size="15" fill="#6b6b6b">A web page,</text>
  <text x="735" y="236" font-size="15" fill="#6b6b6b">point and click</text>
  <text x="590" y="300" font-size="14" fill="#9a9aa2" font-family="monospace">morehouse.tapis.io</text>

  <!-- Footer chip -->
  <rect x="305" y="368" width="350" height="40" rx="20" fill="#fdeef0" stroke="#B30022" stroke-opacity="0.35"/>
  <text x="480" y="393" text-anchor="middle" font-size="15" font-weight="600" fill="#B30022">Allocation TRA25001  ·  gh GPU queue</text>
</svg>
